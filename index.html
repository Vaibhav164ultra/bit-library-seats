<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>BIT Library Seats | Bangalore Institute of Technology</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'] },
          boxShadow: {
            glass: '0 8px 32px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06)',
            seat: '0 4px 24px rgba(15,23,42,.45)',

        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

  <style>
    :root {
      --bg-deep: #030712;
      --glass: rgba(255, 255, 255, 0.045);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(99, 102, 241, 0.22), transparent),
        radial-gradient(900px 500px at 100% 0%, rgba(236, 72, 153, 0.12), transparent),
        var(--bg-deep);
      color: #f8fafc;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .glass-panel {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .tabular-nums {
      font-variant-numeric: tabular-nums;
    }
    .noise {
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }
    .icon-svg {
      display: inline-block;
      flex-shrink: 0;
      vertical-align: middle;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,.06) 25%, rgba(255,255,255,.12) 50%, rgba(255,255,255,.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
    }
    .view-fade-enter { opacity: 0; transform: translateY(8px); }
    .view-fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 0.35s ease, transform 0.35s ease; }
    .login-hero-mesh {
      background:
        radial-gradient(ellipse 100% 80% at 15% 20%, rgba(99, 102, 241, 0.35), transparent 55%),
        radial-gradient(ellipse 80% 60% at 85% 70%, rgba(236, 72, 153, 0.18), transparent 50%),
        radial-gradient(ellipse 60% 50% at 50% 100%, rgba(34, 211, 238, 0.08), transparent 45%);
    }
    .login-orbit {
      position: absolute;
      inset: -20%;
      background: conic-gradient(from 180deg at 50% 50%, rgba(99, 102, 241, 0.12), transparent, rgba(168, 85, 247, 0.1), transparent, rgba(99, 102, 241, 0.12));
      animation: orbit-spin 28s linear infinite;
      opacity: 0.5;
    }
    @keyframes orbit-spin {
      to { transform: rotate(360deg); }
    }
    .login-card-glow {
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 24px 80px -20px rgba(79, 70, 229, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .dash-hero-strip {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(99, 102, 241, 0.08) 100%);
    }
    .lib-card-hover {
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s ease, border-color 0.25s ease;
    }
    .lib-card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(129, 140, 248, 0.25);
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div id="root" class="relative z-10"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo, memo } = React;

    /**
     * Timer policy: set DEMO_FAST_TIMERS to false for production-like durations.
     * Inactivity uses real user events (mouse, keyboard, scroll) + tab visibility.
     */
    const DEMO_FAST_TIMERS = true;
    const INACTIVITY_BEFORE_WARNING_MS = DEMO_FAST_TIMERS ? 45 * 1000 : 15 * 60 * 1000;
    const GRACE_PERIOD_MS = DEMO_FAST_TIMERS ? 20 * 1000 : 3 * 60 * 1000;
    const RESERVATION_HOLD_MS = 10 * 60 * 1000; /* 10 min pre-book — server is source of truth */
    const SESSION_EXPIRING_SOON_MS = DEMO_FAST_TIMERS ? 20 * 1000 : 5 * 60 * 1000;

    const PEAK_USAGE_LABEL = '2:00 PM – 5:00 PM (weekdays)';

    const LIBRARIES = [
      {
        id: 'lib1',
        name: 'Lib-1',
        subtitle: 'Main Study Hall',
        total: 24,
        accent: 'from-violet-500 to-indigo-500',
        perks: 'Open layout · Power strips',
      },
      {
        id: 'lib2',
        name: 'Lib-2',
        subtitle: 'Engineering Library',
        total: 20,
        accent: 'from-sky-500 to-cyan-500',
        perks: 'Stacks · Reference zone',
      },
      {
        id: 'lib3',
        name: 'Lib-3',
        subtitle: 'Quiet Zone',
        total: 16,
        accent: 'from-emerald-500 to-teal-500',
        perks: 'Silent · Individual focus',
      },
    ];

    /** Same-origin when served by Express; override with window.BIT_API_BASE if needed */
    const API_ROOT =
      (typeof window !== 'undefined' && window.BIT_API_BASE) ||
      (typeof location !== 'undefined' && location.protocol.startsWith('http')
        ? `${location.origin}/api`
        : 'http://localhost:3001/api');

    async function api(path, options = {}) {
      const url = `${String(API_ROOT).replace(/\/$/, '')}${path.startsWith('/') ? path : `/${path}`}`;
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      const token = typeof localStorage !== 'undefined' ? localStorage.getItem('bit_token') : null;
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(url, { ...options, headers });
      let data = {};
      try {
        const text = await res.text();
        if (text) data = JSON.parse(text);
      } catch (_) {
        /* non-JSON */
      }
      if (!res.ok) {
        const msg = data.error || res.statusText || 'Request failed';
        const err = new Error(msg);
        err.status = res.status;
        err.code = data.code;
        throw err;
      }
      return data;
    }

    const uid = () => Math.random().toString(36).slice(2, 10);

    function formatDuration(ms) {
      if (ms == null || ms <= 0) return '0:00';
      const s = Math.ceil(ms / 1000);
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${r < 10 ? '0' : ''}${r}`;
    }

    function formatClock(ms) {
      if (ms == null || ms <= 0) return '00:00';
      const total = Math.floor(ms / 1000);
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      const pad = (n) => (n < 10 ? '0' : '') + n;
      return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
    }

    /**
     * Inline SVG icons — do NOT use lucide createIcons() inside React; it replaces DOM
     * nodes and causes a blank page after modals close (e.g. check-in time picker).
     */
    const Icon = memo(function Icon({ name, size = 20, className = '' }) {
      const s = {
        xmlns: 'http://www.w3.org/2000/svg',
        width: size,
        height: size,
        viewBox: '0 0 24 24',
        fill: 'none',
        stroke: 'currentColor',
        strokeWidth: 2,
        strokeLinecap: 'round',
        strokeLinejoin: 'round',
        className: 'icon-svg ' + (className || ''),
        'aria-hidden': true,
      };
      switch (name) {
        case 'check-circle':
          return (
            <svg {...s}>
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
          );
        case 'alert-triangle':
          return (
            <svg {...s}>
              <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
              <line x1="12" y1="9" x2="12" y2="13" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
          );
        case 'x-circle':
          return (
            <svg {...s}>
              <circle cx="12" cy="12" r="10" />
              <path d="m15 9-6 6" />
              <path d="m9 9 6 6" />
            </svg>
          );
        case 'info':
          return (
            <svg {...s}>
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="16" x2="12" y2="12" />
              <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
          );
        case 'users':
          return (
            <svg {...s}>
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          );
        case 'trending-up':
          return (
            <svg {...s}>
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
              <polyline points="16 7 22 7 22 13" />
            </svg>
          );
        case 'layout-grid':
          return (
            <svg {...s}>
              <rect width="7" height="7" x="3" y="3" rx="1" />
              <rect width="7" height="7" x="14" y="3" rx="1" />
              <rect width="7" height="7" x="14" y="14" rx="1" />
              <rect width="7" height="7" x="3" y="14" rx="1" />
            </svg>
          );
        case 'graduation-cap':
          return (
            <svg {...s}>
              <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
              <path d="M6 12h5a4 4 0 0 1 4 4v5" />
              <path d="M18 12h-5a4 4 0 0 0-4 4v5" />
            </svg>
          );
        case 'arrow-left':
          return (
            <svg {...s}>
              <path d="m12 19-7-7 7-7" />
              <path d="M19 12H5" />
            </svg>
          );
        case 'sofa':
          return (
            <svg {...s}>
              <path d="M20 10V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v3" />
              <path d="M4 15a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3H4Z" />
              <path d="M6 15v2" />
              <path d="M18 15v2" />
            </svg>
          );
        case 'user-check':
          return (
            <svg {...s}>
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <polyline points="16 11 18 13 22 9" />
            </svg>
          );
        case 'timer':
          return (
            <svg {...s}>
              <line x1="10" x2="14" y1="2" y2="2" />
              <line x1="12" x2="15" y1="14" y2="11" />
              <circle cx="12" cy="14" r="8" />
            </svg>
          );
        case 'book-open':
          return (
            <svg {...s}>
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </svg>
          );
        case 'log-out':
          return (
            <svg {...s}>
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" x2="9" y1="12" y2="12" />
            </svg>
          );
        case 'bell-ring':
          return (
            <svg {...s}>
              <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
              <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
              <path d="M4 2C2.8 3.7 2 5.7 2 8" />
              <path d="M22 8c0-2.3-.8-4.3-2-6" />
            </svg>
          );
        case 'clock':
          return (
            <svg {...s}>
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
          );
        case 'sparkles':
          return (
            <svg {...s}>
              <path d="m12 3-1.2 3.6L7 8l3.8 1.4L12 13l1.2-3.6L17 8l-3.8-1.4L12 3z" />
              <path d="M19 3v4M21 5h-4M5 19H3M5 21v-2" />
            </svg>
          );
        default:
          return (
            <svg {...s}>
              <circle cx="12" cy="12" r="10" />
            </svg>
          );
      }
    });

    function useToasts() {
      const [toasts, setToasts] = useState([]);
      const push = useCallback((message, variant = 'info') => {
        const id = uid();
        setToasts((t) => [...t, { id, message, variant }]);
        window.setTimeout(() => {
          setToasts((t) => t.filter((x) => x.id !== id));
        }, 4200);
      }, []);
      const remove = useCallback((id) => setToasts((t) => t.filter((x) => x.id !== id)), []);
      return { toasts, push, remove };
    }

    function ToastStack({ toasts, onDismiss }) {
      if (!toasts.length) return null;
      return (
        <div className="fixed bottom-24 right-4 z-[100] flex max-w-sm flex-col gap-2 sm:bottom-8 sm:right-8" role="status" aria-live="polite">
          {toasts.map((t) => (
            <button
              key={t.id}
              type="button"
              onClick={() => onDismiss(t.id)}
              className={
                'glass-panel flex items-start gap-3 rounded-2xl px-4 py-3 text-left text-sm shadow-glass animate__animated animate__fadeInUp ' +
                (t.variant === 'success'
                  ? 'border-emerald-500/40 bg-emerald-500/10'
                  : t.variant === 'warn'
                  ? 'border-amber-500/40 bg-amber-500/10'
                  : t.variant === 'error'
                  ? 'border-rose-500/40 bg-rose-500/10'
                  : 'border-white/15 bg-slate-900/70')
              }
            >
              <span className="mt-0.5 shrink-0">
                {t.variant === 'success' && <Icon name="check-circle" className="text-emerald-300" />}
                {t.variant === 'warn' && <Icon name="alert-triangle" className="text-amber-300" />}
                {t.variant === 'error' && <Icon name="x-circle" className="text-rose-300" />}
                {t.variant === 'info' && <Icon name="info" className="text-sky-300" />}
              </span>
              <span className="text-slate-100">{t.message}</span>
            </button>
          ))}
        </div>
      );
    }

    /** Active session always wins over a hold timer */
    function seatDerivedStatus(seat, now, myUserId, graceSeatId) {
      if (seat.sessionUntil && seat.sessionUntil > now) {
        const left = seat.sessionUntil - now;
        const mine = myUserId && seat.holderId === myUserId;
        const expiring = left < SESSION_EXPIRING_SOON_MS || (mine && graceSeatId === seat.id);
        return expiring ? 'expiring' : 'occupied';
      }
      if (seat.reservationUntil && seat.reservationUntil > now) {
        if (myUserId && seat.holderId === myUserId) return 'reserved';
        if (seat.holderId) return 'reserved_other';
      }
      return 'available';
    }

    function DashboardSkeleton() {
      return (
        <div className="space-y-8">
          <div className="glass-panel dash-hero-strip rounded-3xl p-6 sm:p-8">
            <div className="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
              <div className="space-y-3">
                <div className="skeleton h-5 w-40 rounded-md" />
                <div className="skeleton h-10 w-64 max-w-full rounded-lg" />
                <div className="skeleton h-4 w-48 rounded-md" />
              </div>
              <div className="flex flex-wrap gap-3">
                <div className="skeleton h-16 w-[7.5rem] rounded-2xl" />
                <div className="skeleton h-16 w-[7.5rem] rounded-2xl" />
                <div className="skeleton h-16 w-[7.5rem] rounded-2xl" />
              </div>
            </div>
          </div>
          <div className="grid gap-6 md:grid-cols-3">
            {[1, 2, 3].map((k) => (
              <div key={k} className="glass-panel rounded-3xl p-8">
                <div className="mb-6 flex justify-between">
                  <div className="skeleton h-14 w-14 rounded-2xl" />
                  <div className="skeleton h-6 w-16 rounded-full" />
                </div>
                <div className="skeleton mb-3 h-8 w-3/4 rounded-lg" />
                <div className="skeleton mb-4 h-4 w-full rounded-lg" />
                <div className="skeleton mb-6 h-3 w-full rounded-full" />
                <div className="skeleton h-3 w-full rounded-full" />
              </div>
            ))}
          </div>
        </div>
      );
    }

    function StatChip({ icon, label, value, sub, accent }) {
      return (
        <div
          className={
            'flex min-w-[148px] flex-1 items-center gap-3 rounded-2xl border px-4 py-3.5 backdrop-blur-md ' +
            (accent
              ? 'border-indigo-400/25 bg-gradient-to-br from-indigo-500/15 to-violet-600/10 shadow-lg shadow-indigo-950/30'
              : 'glass-panel border-white/[0.07]')
          }
        >
          <div
            className={
              'flex h-11 w-11 shrink-0 items-center justify-center rounded-xl ' +
              (accent ? 'bg-white/10 text-white' : 'bg-white/[0.06] text-indigo-200')
            }
          >
            <Icon name={icon} size={19} />
          </div>
          <div className="min-w-0">
            <p className="text-[10px] font-semibold uppercase tracking-wider text-slate-400">{label}</p>
            <p className="text-xl font-bold tabular-nums tracking-tight text-white">{value}</p>
            {sub && <p className="truncate text-[11px] text-slate-500">{sub}</p>}
          </div>
        </div>
      );
    }

    function App() {
      const [booting, setBooting] = useState(true);
      const [view, setView] = useState('login'); /* login | dash | map */
      const [user, setUser] = useState(null);
      const [studentIdInput, setStudentIdInput] = useState('');
      const [selectedLib, setSelectedLib] = useState(null);
      const [seats, setSeats] = useState({});
      const [now, setNow] = useState(Date.now());

      /** Active session owned by current user (single session enforced) */
      const [session, setSession] = useState(null);
      /* session: { seatId, libId, sessionUntil, reservationUntil? } */

      const [modal, setModal] = useState(null);
      /* modal: { type:'reserve'|'sessionLen', seat } | { type:'idle', graceEndsAt } */

      const [manualCodeInput, setManualCodeInput] = useState('');
      const [cameraActive, setCameraActive] = useState(false);

      const { toasts, push, remove } = useToasts();
      const sessionRef = useRef(null);
      const lastActivityRef = useRef(Date.now());
      const idleWarnedRef = useRef(false);
      const activityThrottleRef = useRef(0);
      const lastServerBumpRef = useRef(0);

      useEffect(() => {
        sessionRef.current = session;
      }, [session]);

      const processPendingCheckin = useCallback((currentSession, currentSeats) => {
        const pendingStr = localStorage.getItem('bit_pending_checkin');
        if (!pendingStr) return;
        try {
          const pending = JSON.parse(pendingStr);
          localStorage.removeItem('bit_pending_checkin'); // Consume it

          // Find the library for this seat
          let foundLib = null;
          let foundSeat = null;
          for (const lib of LIBRARIES) {
            const list = currentSeats[lib.id] || [];
            const match = list.find((s) => s.id === pending.seatId);
            if (match) {
              foundLib = lib;
              foundSeat = match;
              break;
            }
          }

          if (!foundSeat) {
            push('Seat not found for the scanned QR code.', 'error');
            return;
          }

          // Case 1: User has a reservation for THIS seat
          if (currentSession && currentSession.seatId === pending.seatId && currentSession.reservationUntil && !currentSession.sessionUntil) {
            setSelectedLib(foundLib);
            setView('map');
            setModal({ type: 'sessionLen', seat: foundSeat, qrToken: pending.qrToken });
            push(`QR verified for Seat ${foundSeat.num}. Select session length.`, 'success');
            return;
          }

          // Case 2: User has a reservation for a DIFFERENT seat
          if (currentSession && currentSession.seatId !== pending.seatId) {
            push(`You already hold a reservation for a different seat. You scanned Seat #${foundSeat.num}.`, 'error');
            return;
          }

          // Case 3: User is checked in already
          if (currentSession && currentSession.sessionUntil) {
            if (currentSession.seatId === pending.seatId) {
              push('You are already checked in to this seat.', 'info');
            } else {
              push('You already have an active check-in at another seat.', 'warn');
            }
            return;
          }

          // Case 4: User has no reservation at all. Prompt to reserve and check in directly.
          if (!currentSession) {
            setSelectedLib(foundLib);
            setView('map');
            setModal({ type: 'qrDirectReserve', seat: foundSeat, qrToken: pending.qrToken });
            return;
          }
        } catch (e) {
          console.error('Failed to parse pending check-in', e);
        }
      }, [push]);

      const handleDirectReserveAndCheckIn = async (seat, qrToken) => {
        try {
          const data = await api('/actions/reserve', {
            method: 'POST',
            body: JSON.stringify({ libraryId: seat.id.split('-')[0], seatId: seat.id }),
          });
          setSeats(data.seats || {});
          setSession(data.session ?? null);
          setModal({ type: 'sessionLen', seat, qrToken });
          push(`Seat ${seat.num} reserved automatically.`, 'success');
        } catch (e) {
          push(e.message || 'Failed to reserve seat.', 'error');
        }

      // Check for URL parameters on mount and handle pending check-ins
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const checkinSeatId = params.get('checkinSeatId');
        const qrToken = params.get('qrToken');
        if (checkinSeatId && qrToken) {
          localStorage.setItem('bit_pending_checkin', JSON.stringify({ seatId: checkinSeatId, qrToken }));
          // Clean URL
          const newUrl = window.location.pathname;
          window.history.replaceState({}, document.title, newUrl);
        }
      }, []);

      const qrScannerRef = useRef(null);

      useEffect(() => {
        if (modal && modal.type === 'qrVerify' && cameraActive) {
          const html5QrCode = new Html5Qrcode("qr-reader");
          qrScannerRef.current = html5QrCode;
          
          html5QrCode.start(
            { facingMode: "environment" },
            {
              fps: 10,
              qrbox: { width: 250, height: 250 }
            },
            (decodedText) => {
              try {
                let token = null;
                let seatId = null;
                
                if (decodedText.startsWith('http')) {
                  const url = new URL(decodedText);
                  const params = new URLSearchParams(url.search);
                  token = params.get('qrToken');
                  seatId = params.get('checkinSeatId');
                }
                
                // Fallback to raw text if not a URL
                if (!token) {
                  token = decodedText.trim();
                  seatId = modal.seat.id;
                }
                
                if (seatId === modal.seat.id && token) {
                  html5QrCode.stop().then(() => {
                    setCameraActive(false);
                    setModal({ type: 'sessionLen', seat: modal.seat, qrToken: token });
                    push('QR Code verified!', 'success');
                  }).catch(() => {
                    setCameraActive(false);
                    setModal({ type: 'sessionLen', seat: modal.seat, qrToken: token });
                  });
                } else {
                  push(`Wrong QR Code. This is Seat #${modal.seat.num}. Please scan the correct QR code.`, 'warn');
                }
              } catch (e) {
                console.error(e);
              }
            },
            () => {}
          ).catch((err) => {
            console.warn("Camera access failed", err);
            push("Could not open camera. Try typing the backup code.", "warn");
            setCameraActive(false);
          });
          
          return () => {
            if (qrScannerRef.current) {
              try {
                qrScannerRef.current.stop().catch(() => {});
              } catch (e) {}
            }
          };
        }
      }, [modal, cameraActive, push]);

      const releaseSeat = useCallback(async (reason) => {
        const cur = sessionRef.current;
        setModal(null);
        idleWarnedRef.current = false;
        try {
          if (cur) {
            await api('/actions/checkout', {
              method: 'POST',
              body: JSON.stringify({ libraryId: cur.libId, seatId: cur.seatId }),
            });
            const st = await api('/state');
            setSeats(st.seats || {});
            setSession(st.session ?? null);
          } else {
            setSession(null);
          }
        } catch (e) {
          if (cur) push(e.message || 'Could not release seat.', 'error');
          setSession(null);
          try {
            const st = await api('/state');
            setSeats(st.seats || {});
            setSession(st.session ?? null);
          } catch (_) {
            /* ignore */
          }
        }
        if (reason === 'auto_idle') push('Seat released after inactivity grace period.', 'error');
        if (reason === 'checkout') push('Checked out successfully.', 'success');
      }, [push]);

      const bumpActivity = useCallback(() => {
        const t = Date.now();
        if (t - activityThrottleRef.current < 800) return;
        activityThrottleRef.current = t;
        lastActivityRef.current = t;
        if (idleWarnedRef.current && sessionRef.current) {
          idleWarnedRef.current = false;
          setModal((m) => (m && m.type === 'idle' ? null : m));
          push('Activity detected — seat kept.', 'success');
        }
        const cur = sessionRef.current;
        if (cur?.sessionUntil && t - lastServerBumpRef.current > 2500) {
          lastServerBumpRef.current = t;
          api('/me/activity', { method: 'POST' })
            .then((data) => {
              if (data && data.seats) setSeats(data.seats);
              if (data && data.session !== undefined) setSession(data.session ?? null);
            })
            .catch(() => {});
        }
      }, [push]);

      /** Restore session from token, or show login */
      useEffect(() => {
        const t = localStorage.getItem('bit_token');
        if (!t) {
          setBooting(false);
          return undefined;
        }
        let cancelled = false;
        (async () => {
          try {
            const data = await api('/state');
            if (cancelled) return;
            setUser(data.user);
            setSeats(data.seats || {});
            setSession(data.session ?? null);
            setView('dash');
            
            // Process pending check-in after state is set
            setTimeout(() => {
              processPendingCheckin(data.session, data.seats || {});
            }, 100);
          } catch {
            localStorage.removeItem('bit_token');
          } finally {
            if (!cancelled) setBooting(false);
          }
        })();
        return () => {
          cancelled = true;
        };
      }, []);

      useEffect(() => {
        const id = window.setInterval(() => setNow(Date.now()), 1000);
        return () => window.clearInterval(id);
      }, []);

      /** Sync seat map from server while logged in */
      useEffect(() => {
        if (!user || view === 'login' || booting) return undefined;
        let cancelled = false;
        const poll = async () => {
          try {
            const data = await api('/state');
            if (cancelled) return;
            setSeats(data.seats || {});
            setSession(data.session ?? null);
          } catch (_) {
            /* keep last snapshot if offline */
          }
        };
        poll();
        const int = window.setInterval(poll, 2000);
        return () => {
          cancelled = true;
          window.clearInterval(int);
        };
      }, [user, view, booting]);

      /** Activity listeners only while checked in (session timer running) */
      useEffect(() => {
        if (!session?.sessionUntil) return undefined;
        const onVis = () => {
          if (document.visibilityState === 'visible') bumpActivity();

        const onWinFocus = () => bumpActivity();
        const onKey = () => bumpActivity();
        const onScroll = () => bumpActivity();
        const onMouse = () => bumpActivity();
        window.addEventListener('keydown', onKey);
        window.addEventListener('scroll', onScroll, true);
        window.addEventListener('mousemove', onMouse, { passive: true });
        window.addEventListener('click', onMouse, true);
        window.addEventListener('focus', onWinFocus);
        document.addEventListener('visibilitychange', onVis);
        return () => {
          window.removeEventListener('keydown', onKey);
          window.removeEventListener('scroll', onScroll, true);
          window.removeEventListener('mousemove', onMouse);
          window.removeEventListener('click', onMouse, true);
          window.removeEventListener('focus', onWinFocus);

                      <p className="text-[10px] font-semibold uppercase tracking-wider text-slate-400">Signed in</p>
                      <p className="truncate text-sm font-semibold text-white">{user.name}</p>
                      {!session && <p className="text-[11px] text-slate-500">No active session</p>}
                      {session && (
                        <p className="text-[11px] text-indigo-200">
                          {mineSeat?.sessionUntil ? `Seat ${mineSeat.num} · session` : `Seat ${mineSeat?.num} · reserved`}
                        </p>

                    </div>
                  )}
                  {user && (
                    <button
                      type="button"
                      onClick={logout}
                      className="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs font-semibold text-slate-200 transition hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400"
                    >
                      <Icon name="log-out" size={16} />
                      <span className="hidden sm:inline">Sign out</span>
                    </button>

                </div>
              </div>
            </nav>

          <main>
            {view === 'login' && renderLogin()}

          {modal && modal.type === 'reserve' && (

                    onClick={() => startReservation(modal.seat)}

                <div className="mt-8 flex gap-3">
                  <button

                    onClick={() => setModal(null)}

                  >
                    Cancel
                  </button>
                  <button
                    type="button"
                    onClick={() => handleDirectReserveAndCheckIn(modal.seat, modal.qrToken)}
                    className="flex-1 rounded-2xl bg-gradient-to-r from-indigo-500 to-violet-600 py-3 text-sm font-bold text-white shadow-lg hover:brightness-110"
                  >
                    Reserve & Check In
                  </button>
                </div>
              </div>
            </div>

          {/* Session length picker after reserve or direct */}
          {modal && modal.type === 'sessionLen' && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4 backdrop-blur-md animate__animated animate__fadeIn" role="dialog" aria-modal="true">
              <div className="glass-panel w-full max-w-md rounded-3xl p-8 shadow-glass animate__animated animate__zoomIn">
                <h3 className="text-xl font-bold text-white">Check in — Seat {modal.seat.num}</h3>
                <p className="mt-2 text-sm text-slate-400">Choose how long you plan to study. You can check out early anytime. Inactivity may prompt you to confirm presence.</p>
                <div className="mt-8 grid grid-cols-2 gap-3">
                  {[30, 60, 120, 180].map((m) => (
                    <button
                      key={m}
                      type="button"
                      onClick={() => confirmCheckIn(m, modal.qrToken)}
                      className="rounded-2xl border border-white/10 bg-white/5 py-4 text-sm font-bold text-white transition hover:border-indigo-400/50 hover:bg-indigo-500/20"
                    >
                      {m} min
                    </button>
                  ))}
                </div>
                <button type="button" onClick={() => setModal(null)} className="mt-6 w-full text-center text-xs font-semibold uppercase tracking-wider text-slate-500 hover:text-slate-300">
                  Close
                </button>
              </div>
            </div>
          )}

          {/* Idle warning */}
          {modal && modal.type === 'idle' && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4 backdrop-blur-lg animate__animated animate__fadeIn" role="alertdialog" aria-modal="true">
              <div className="glass-panel w-full max-w-md rounded-3xl border-amber-500/30 p-8 shadow-glass animate__animated animate__pulse">
                <div className="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-amber-500/20 text-amber-200">
                  <Icon name="bell-ring" size={28} />
                </div>
                <h3 className="text-center text-xl font-bold text-white">Still at your seat?</h3>
                <p className="mt-2 text-center text-sm text-slate-400">We have not detected keyboard, mouse, or scroll activity for a while. Respond before the grace period ends or your seat will be released.</p>

                <div className="mt-8 flex flex-col gap-3">

                    type="button"

                  >
                    I am still studying

                  <button
                    type="button"
                    onClick={() => {
                      releaseSeat('checkout');
                    }}
                    className="w-full rounded-2xl border border-white/10 py-3 text-sm font-semibold text-slate-200 hover:bg-white/5"
                  >
                    I am leaving
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Bottom session bar */}
          {user && session && mineSeat && (
            <div className="fixed bottom-4 left-1/2 z-30 w-[94%] max-w-lg -translate-x-1/2 animate__animated animate__slideInUp">
              <div className="glass-panel flex items-center justify-between gap-4 rounded-3xl border-indigo-500/30 bg-indigo-950/40 p-4 shadow-glass">
                <div className="flex min-w-0 items-center gap-3">
                  <div className="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-indigo-500/30 text-indigo-100">
                    <Icon name="clock" />
                  </div>
                  <div className="min-w-0">
                    <p className="text-[10px] font-bold uppercase tracking-wider text-indigo-300">
                      {mineSeat.sessionUntil ? 'Session ends in' : 'Reservation ends in'}
                    </p>
                    <p className="truncate text-lg font-bold tabular-nums text-white">
                      {mineSeat.sessionUntil ? formatClock(sessionRemaining) : formatClock(reservationRemaining)}
                    </p>
                    <p className="truncate text-xs text-slate-400">
                      {LIBRARIES.find((l) => l.id === session.libId)?.name} · Seat {mineSeat.num}
                    </p>
                  </div>
                </div>
                <button
                  type="button"
                  onClick={() => releaseSeat('checkout')}
                  className="shrink-0 rounded-2xl bg-rose-500/90 px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-white transition hover:bg-rose-500"
                >
                  Check out
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
